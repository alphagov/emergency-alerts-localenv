services:
  utils:
    build:
      context: repos/emergency-alerts-utils
      dockerfile: Dockerfile.eas-base
    image: localhost/eas-localenv-base
    command:
      ["echo", "This is utils - just a base image that doesn't do anything."]
    restart: no

  api:
    build:
      context: repos/emergency-alerts-api
      dockerfile: Dockerfile.eas-api
      args:
        BASE_IMAGE: localhost/eas-localenv-base
    image: localhost/eas-localenv-api
    command:
      - bash
      - -c
      - . /eas/emergency-alerts-api/environment.sh && bash /start-api.sh
    environment:
      SERVICE_ACTION: run_api

      AWS_ACCESS_KEY_ID: aws_key
      AWS_SECRET_ACCESS_KEY: aws_secret
      AWS_DEFAULT_REGION: local
      AWS_ENDPOINT_URL: http://sqs:9324
      SQS_QUEUE_BASE_URL: http://sqs:9324

      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: api
      OTEL_METRICS_EXPORTER: none
    ports:
      - "6011:6011"
    volumes:
      - ./repos/emergency-alerts-api:/eas/emergency-alerts-api
      - ./repos/emergency-alerts-utils:/eas/emergency-alerts-utils

      - ./environment.sh:/eas/emergency-alerts-api/environment.sh:ro
      - ./repos/emergency-alerts-api/scripts/start-api.sh:/start-api.sh:ro
    depends_on:
      - pg

  celery:
    build:
      context: repos/emergency-alerts-api
      dockerfile: Dockerfile.eas-celery
      args:
        BASE_IMAGE: localhost/eas-localenv-base
    image: localhost/eas-localenv-celery
    command:
      - bash
      - -c
      - . /eas/emergency-alerts-api/environment.sh && bash /start-celery.sh
    environment:
      AWS_ACCESS_KEY_ID: aws_key
      AWS_SECRET_ACCESS_KEY: aws_secret
      AWS_DEFAULT_REGION: local
      AWS_ENDPOINT_URL: http://sqs:9324
      SQS_QUEUE_BASE_URL: http://sqs:9324

      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: api
      OTEL_METRICS_EXPORTER: none
    volumes:
      - ./repos/emergency-alerts-api:/eas/emergency-alerts-api
      - ./repos/emergency-alerts-utils:/eas/emergency-alerts-utils

      - ./environment.sh:/eas/emergency-alerts-api/environment.sh:ro
      - ./repos/emergency-alerts-api/scripts/start-api.sh:/start-api.sh:ro
    depends_on:
      - pg

  admin:
    build:
      context: repos/emergency-alerts-admin
      dockerfile: Dockerfile.eas-admin
      args:
        BASE_IMAGE: localhost/eas-localenv-base
    image: localhost/eas-localenv-admin
    command:
      - bash
      - -c
      - . /eas/emergency-alerts-admin/environment.sh && bash /start.sh
    ports:
      - "6012:6012"
    volumes:
      - ./repos/emergency-alerts-admin:/eas/emergency-alerts-admin
      - ./repos/emergency-alerts-utils:/eas/emergency-alerts-utils

      - ./environment.sh:/eas/emergency-alerts-admin/environment.sh:ro
      - ./repos/emergency-alerts-admin/scripts/start.sh:/start.sh:ro
    environment:
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: admin
      OTEL_METRICS_EXPORTER: none

  govuk:
    build:
      context: repos/emergency-alerts-govuk
      dockerfile: Dockerfile.eas-govuk-alerts
      args:
        BASE_IMAGE: localhost/eas-localenv-base
    image: localhost/eas-localenv-govuk
    command:
      - bash
      - -c
      - . /eas/emergency-alerts-govuk/environment.sh && bash /start-govuk.sh
    ports:
      - "6017:6017"
    environment:
      AWS_ACCESS_KEY_ID: aws_key
      AWS_SECRET_ACCESS_KEY: aws_secret
      AWS_DEFAULT_REGION: eu-west-2 # Needs to be representative to let the AWS SDK autodiscover work
      AWS_REGION: local
      AWS_ENDPOINT_URL_SQS: http://sqs:9324
      SQS_QUEUE_BASE_URL: http://sqs:9324

      AWS_ENDPOINT_URL_S3: http://minio:9000

      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: govuk-alerts
      OTEL_METRICS_EXPORTER: none
    volumes:
      - ./repos/emergency-alerts-govuk:/eas/emergency-alerts-govuk
      - ./repos/emergency-alerts-utils:/eas/emergency-alerts-utils

      - ./environment.sh:/eas/emergency-alerts-govuk/environment.sh:ro
      - ./repos/emergency-alerts-govuk/scripts/start-govuk.sh:/start-govuk.sh:ro

  # Uncomment to run first database setup (creates tables and migrations)
  db-init:
    image: localhost/eas-localenv-api
    user: root # Override so we can install packages
    restart: no
    entrypoint: /eas/emergency-alerts-api/db-init.sh
    volumes:
      - ./repos/emergency-alerts-api:/eas/emergency-alerts-api
      - ./repos/emergency-alerts-utils:/eas/emergency-alerts-utils
      - ./repos/emergency-alerts-tooling:/eas/emergency-alerts-tooling

      - ./environment.sh:/eas/emergency-alerts-api/environment.sh:ro
      - ./db-init.sh:/eas/emergency-alerts-api/db-init.sh:ro
    depends_on:
      - pg

  pg:
    image: postgis/postgis:14-3.5
    platform: linux/amd64
    container_name: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_DB: $POSTGRES_DB
      USER: $USER
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d:ro
      - pg-data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    environment:
      MINIO_ROOT_USER: aws_key
      MINIO_ROOT_PASSWORD: aws_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # MinIO Client to create bucket automatically
  minio-bucket-prep:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    restart: no
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 aws_key aws_secret;
        mc mb local/local-govuk-alerts;
        exit 0;
      "

  sqs:
    image: softwaremill/elasticmq:1.6.15
    ports:
      - "9324:9324" # SQS API
      - "9325:9325" # SQS UI
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf:ro

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.12.0
    environment:
      - LOG_LEVEL=debug
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

volumes:
  pg-data: {}
  minio-data: {}
